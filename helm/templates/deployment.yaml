apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailfrom-milter
  labels:
    app: mailfrom-milter
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mailfrom-milter
  template:
    metadata:
      labels:
        app: mailfrom-milter
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mailfrom-milter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: milter
              containerPort: {{ .Values.milterPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.milterPort }}"
            - name: METRICS_ADDR
              value: "0.0.0.0:{{ .Values.metricsPort }}"
            - name: MF_ACTION
              value: "{{ .Values.MF_ACTION }}"
            - name: REJECT_CODE
              value: "{{ .Values.REJECT_CODE }}"
            - name: MF_SENDER_ADD
              value: "{{ .Values.MF_SENDER_ADD }}"
            {{- if .Values.logLevel }}
            - name: LOG_LEVEL
              value: "{{ .Values.logLevel }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

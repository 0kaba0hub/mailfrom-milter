apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailfrom
  labels:
    app: mailfrom
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mailfrom
  template:
    metadata:
      labels:
        app: mailfrom
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mailfrom
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: milter
              containerPort: {{ .Values.milterPort }}
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.milterPort }}"
            - name: ACTION
              value: "{{ .Values.action }}"
            {{- if .Values.logLevel }}
            - name: LOG_LEVEL
              value: "{{ .Values.logLevel }}"
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: milter
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: milter
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

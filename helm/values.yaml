image:
  repository: ghcr.io/0kaba0hub/mailfrom-milter
  tag: "latest"
  pullPolicy: Always

imagePullSecrets: []

replicaCount: 1

# Milter listen port inside the container
milterPort: 10031

# Observability port — /healthz, /readyz, /metrics
metricsPort: 8081

# Action on envelope-from / From-header domain mismatch.
# Values: reject | discard | quarantine_header | accept
MF_ACTION: reject

# SMTP reply code for reject action: 421 (temporary) or 550 (permanent)
REJECT_CODE: "421"

# Set to "yes" to add X-MF-Envelope-From header on accepted authenticated
# messages (reject and discard actions only)
MF_SENDER_ADD: "no"

# Set to "debug" to enable verbose per-message logging
logLevel: ""

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

nodeSelector: {}

# Post-deployment smoke test (Helm post-install/post-upgrade hook Job).
# The Job skips automatically if the credentials secret is absent.
#
# Create the secret once (outside Helm):
#   kubectl create secret generic mailfrom-test-creds \
#     --from-literal=password='<smtp-password>' -n <namespace>
postDeployTest:
  enabled: false
  credentialsSecret: "mailfrom-test-creds"  # all params loaded from this secret

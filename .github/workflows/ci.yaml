name: CI — mailfrom-milter

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "helm/**"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "helm/**"

env:
  REGISTRY: ghcr.io
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/mailfrom-milter
  DOCKERHUB_IMAGE: docker.io/0kaba0/mailfrom-milter
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: app/go/go.mod
          cache-dependency-path: app/go/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        working-directory: app/go
        run: golangci-lint run ./...

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: app/go/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-24.04
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: app/go/go.mod
          cache-dependency-path: app/go/go.sum

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run tests
        working-directory: app/go
        run: |
          set -o pipefail
          go test -v ./... 2>&1 | go-junit-report -set-exit-code > /tmp/test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Go Tests
          path: /tmp/test-results.xml
          reporter: java-junit

  build:
    name: Build & Push
    if: github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-24.04
    concurrency:
      group: build-main-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          APP_VERSION=$(awk '/^appVersion:/{gsub(/"/, ""); print $2}' helm/Chart.yaml)
          RELEASE_TAG="v${APP_VERSION}"
          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q "${RELEASE_TAG}"; then
            IS_RELEASE=false
          else
            IS_RELEASE=true
          fi
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          registry: docker.io
          username: 0kaba0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }},enable=${{ steps.version.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: app/go
          file: app/go/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        if: steps.version.outputs.is_release == 'true'
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create git tag and GitHub Release
        if: steps.version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md

      - name: Update image tag in values
        run: |
          set -e
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            sed -i "s/^  tag: .*/  tag: \"${SHA}\"/" helm_values/values-sandbox.yaml
            git add helm_values/values-sandbox.yaml

            if git diff --cached --quiet; then
              echo "Values already at ${SHA}, nothing to commit"
              exit 0
            fi

            git commit -m "ci: update mailfrom image tag to ${SHA} [skip ci]"

            if git push; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Push attempt ${attempt} failed, retrying"
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: 0kaba0
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: 0kaba0/mailfrom-milter
          readme-filepath: README.md

      - name: Cleanup old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: mailfrom-milter
          package-type: container
          min-versions-to-keep: 10
          token: ${{ secrets.GHCR_DELETE_TOKEN }}

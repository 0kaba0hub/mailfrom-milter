name: CI — mailfrom

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "helm/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "helm/**"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/mailfrom
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go/go.mod

      - name: Run tests
        working-directory: app/go
        run: go test -v ./...

  build:
    name: Build & Push
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-24.04
    concurrency:
      group: build-main-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: app/go
          file: app/go/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in values
        if: github.event_name == 'push'
        run: |
          set -e
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            sed -i "s/^  tag: .*/  tag: \"${SHA}\"/" helm_values/values-sandbox.yaml
            git add helm_values/values-sandbox.yaml

            if git diff --cached --quiet; then
              echo "Values already at ${SHA}, nothing to commit"
              exit 0
            fi

            git commit -m "ci: update mailfrom image tag to ${SHA} [skip ci]"

            if git push; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Push attempt ${attempt} failed, retrying"
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Cleanup old package versions
        if: github.event_name == 'push'
        uses: actions/delete-package-versions@v5
        with:
          package-name: mailfrom
          package-type: container
          min-versions-to-keep: 10
          token: ${{ secrets.GHCR_DELETE_TOKEN }}
